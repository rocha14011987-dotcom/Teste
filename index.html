<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00FF87">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scout ⚽">
<link rel="manifest" href="manifest.json">
<title>Scout Futebol AI - V12.0 Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#00FF87;--green2:#00c866;--dark:#080c10;--dark2:#0d1520;
  --dark3:#131d2c;--dark4:#1a2438;--border:rgba(0,255,135,0.14);
  --text:#e4edf8;--muted:#5d6f88;--red:#ff4757;--yellow:#ffd32a;
  --purple:#9b5de5;--gold:#ffb703;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;overflow-x:hidden}
.app-container{max-width:500px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none}.screen.active{display:flex;flex-direction:column;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Setup Screen Modern Card */
.setup-card{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:24px;margin:auto 0;text-align:center;box-shadow:0 12px 32px rgba(0,0,0,0.4)}
.logo-area{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:1px;margin-bottom:8px}
.logo-area span{color:var(--green)}
.sub-logo{font-size:12px;color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace}
.input-wrapper{position:relative;margin-bottom:20px}
.input-field{width:100%;background:var(--dark3);border:1px solid var(--border);padding:14px 44px 14px 16px;border-radius:10px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:all 0.2s}
.input-field:focus{border-color:var(--green);box-shadow:0 0 12px rgba(0,255,135,0.2)}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px}
.primary-btn{width:100%;background:var(--green);color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:20px;padding:12px;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.primary-btn:active{transform:scale(0.98);opacity:0.9}

/* Main Dashboard Elements */
.header{display:flex;justify-content:between;align-items:center;padding:8px 0 20px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:24px}
.header-title span{color:var(--green)}
.config-icon-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}

/* Form Controls */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-weight:600}
.main-input{width:100%;background:var(--dark2);border:1px solid var(--border);padding:12px 14px;border-radius:10px;color:#fff;font-size:14px;outline:none}
.main-input:focus{border-color:var(--green)}
.row-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Results Display Components */
.result-box{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.5px}
.bullet-list{list-style:none;padding-left:0}
.bullet-list li{font-size:13px;line-height:1.5;margin-bottom:6px;color:#d1dfef;position:relative;padding-left:14px}
.bullet-list li::before{content:"•";color:var(--green);position:absolute;left:0;font-weight:bold}

/* Value Badge & Probability Indicators */
.prob-container{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.prob-bar-wrapper{background:var(--dark4);height:24px;border-radius:6px;overflow:hidden;position:relative;display:flex}
.prob-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:var(--dark);transition:all 0.4s ease}
.value-badge{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.value-gold{background:var(--gold);color:var(--dark);box-shadow:0 0 10px rgba(255,183,3,0.4)}
.value-purple{background:var(--purple);color:#fff;box-shadow:0 0 10px rgba(155,93,229,0.4)}
.value-justo{background:var(--dark4);color:var(--muted)}

.scout-tip-card{background:linear-gradient(135deg, var(--dark3) 0%, var(--dark2) 100%);border:2px solid var(--gold);border-radius:12px;padding:16px;margin-top:16px;box-shadow:0 6px 20px rgba(255,183,3,0.15)}
.scout-tip-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.scout-tip-body{font-size:13px;line-height:1.5;font-weight:500;color:#fff}

.loader-container{display:none;flex-direction:column;align-items:center;justify-content:center;margin:auto 0;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app-container">
  
  <div id="screen-setup" class="screen">
    <div class="setup-card">
      <div class="logo-area">SCOUT <span>FUTEBOL AI</span></div>
      <div class="sub-logo">PREDITIVO • MULTIMERCADO • V12.0</div>
      <div class="input-wrapper">
        <input type="password" id="api-key-input" class="input-field" placeholder="Insira sua Anthropic API Key...">
        <button type="button" id="toggle-eye" class="eye-btn">👁️</button>
      </div>
      <button type="button" id="btn-save-key" class="primary-btn">SALVAR E ENTRAR</button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <div class="header">
      <div class="header-title">SCOUT <span>FUTEBOL</span></div>
      <button type="button" id="btn-go-config" class="config-icon-btn">⚙️</button>
    </div>

    <div class="form-group">
      <label class="form-label">Times do Confronto</label>
      <div class="row-grid">
        <input type="text" id="input-home" class="main-input" placeholder="Mandante (Casa)">
        <input type="text" id="input-away" class="main-input" placeholder="Visitante (Fora)">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Competição & Contexto Extra (Desfalques, Clima...)</label>
      <input type="text" id="input-context" class="main-input" placeholder="Ex: Brasileirão - Rodada 14, Mandante desfalcado">
    </div>

    <button type="button" id="btn-analyze" class="primary-btn" style="margin-bottom:20px">ANALISAR PARTIDA</button>

    <div id="loading-area" class="loader-container">
      <div class="spinner"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green)">PROCURANDO DADOS COMPATÍVEIS...</div>
    </div>

    <div id="results-area" style="display:none"></div>
  </div>

</div>

<script>
// GERENCIAMENTO CORE DO APP - TOTALMENTE TRATADO CONTRA TRAVAMENTOS SILENCIOSOS
document.addEventListener("DOMContentLoaded", () => {
  const sSetup = document.getElementById("screen-setup");
  const sMain = document.getElementById("screen-main");
  const apiKeyInput = document.getElementById("api-key-input");
  const btnToggleEye = document.getElementById("toggle-eye");
  const btnSaveKey = document.getElementById("btn-save-key");
  const btnGoConfig = document.getElementById("btn-go-config");
  const btnAnalyze = document.getElementById("btn-analyze");
  const loadingArea = document.getElementById("loading-area");
  const resultsArea = document.getElementById("results-area");

  // Verificar Chave ao Iniciar
  const savedKey = localStorage.getItem("anthropic_sk");
  if(savedKey) {
    sMain.classList.add("active");
  } else {
    sSetup.classList.add("active");
  }

  // Controle de Visibilidade do Olho da Senha
  btnToggleEye.addEventListener("click", () => {
    if(apiKeyInput.type === "password") {
      apiKeyInput.type = "text";
      btnToggleEye.textContent = "🔒";
    } else {
      apiKeyInput.type = "password";
      btnToggleEye.textContent = "👁️";
    }
  });

  // Salvar Chave com Higienização Antiespaços (.trim)
  btnSaveKey.addEventListener("click", () => {
    try {
      const cleanKey = apiKeyInput.value.trim();
      if(!cleanKey.startsWith("sk-ant-")) {
        alert("Formato Inválido! Certifique-se de colar a chave secreta Anthropic correta (iniciando em sk-ant-).");
        return;
      }
      localStorage.setItem("anthropic_sk", cleanKey);
      sSetup.classList.remove("active");
      sMain.classList.add("active");
    } catch(err) {
      alert("Erro crítico ao gravar credenciais: " + err.message);
    }
  });

  // Voltar para Configurações
  btnGoConfig.addEventListener("click", () => {
    sMain.classList.remove("active");
    sSetup.classList.add("active");
  });

  // Disparador Principal de Análise
  btnAnalyze.addEventListener("click", async () => {
    const home = document.getElementById("input-home").value.trim();
    const away = document.getElementById("input-away").value.trim();
    const context = document.getElementById("input-context").value.trim();
    const activeKey = localStorage.getItem("anthropic_sk");

    if(!home || !away) {
      alert("Por favor, digite o nome de ambas as equipes para a precificação.");
      return;
    }

    // Configuração Visual do Fluxo
    btnAnalyze.disabled = true;
    resultsArea.style.display = "none";
    loadingArea.style.display = "flex";

    // System Prompt Otimizado (Economia Máxima de Tokens + Blindagem Antierros)
    const systemPrompt = `Você é o motor analítico central do Scout Futebol AI. Forneça saídas puramente orientadas a dados estruturados e sem textos explicativos redundantes.
Regras de cálculo:
1. Prioridade H2H: O Confronto Direto recente (3 anos) tem peso de 60% sobre a forma geral (40%).
2. Teto Casa: A vantagem do mandante é limitada a ganho máximo de +8% na probabilidade.
3. Penalização: Desfalques ofensivos importantes ou cansaço extremo (finais jogadas há menos de 4 dias) reduzem projeções de Over e BTTS em 15% de forma imediata.
4. Responda estritamente no formato JSON abaixo, contendo apenas bullet points curtos (máximo 3 tópicos por campo). Se houver valor acima de 5% comparado à odd teórica, rotule como 'ALTO VALOR'.

Formato de Resposta Exclusivo:
{
  "contexto": "Tipo de jogo e impacto tático curto",
  "casa_dados": ["Dado 1", "Dado 2"],
  "fora_dados": ["Dado 1", "Dado 2"],
  "h2h_dados": ["Dado 1"],
  "home_prob": 45, "draw_prob": 30, "away_prob": 25,
  "btts_prob": 52, "over25_prob": 48,
  "value_status": "ALTO VALOR +8% / VALOR JUSTO / EVITAR",
  "palpite_principal": "Seleção Exata do Mercado",
  "raciocinio_final": "Explicação direta matadora de uma única linha."
}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": activeKey,
          "anthropic-version": "2023-06-01",
          "dangerously-allow-browser": "true"
        },
        body: JSON.stringify({
          model: "claude-3-5-haiku-20241022",
          max_tokens: 1200,
          system: systemPrompt,
          messages: [{
            role: "user",
            content: `Gere a análise para a partida de futebol: ${home} vs ${away}. Contexto extra: ${context}.`
          }]
        })
      });


      if(!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || "Falha de comunicação.");
      }

      const rawData = await response.json();
      const textResponse = rawData.content[0].text;
      
      // Sanitizar JSON para evitar quebras por caracteres estranhos
      const jsonStart = textResponse.indexOf("{");
      const jsonEnd = textResponse.lastIndexOf("}") + 1;
      const cleanJson = textResponse.substring(jsonStart, jsonEnd);
      const data = JSON.parse(cleanJson);

      // Renderização Dinâmica da Interface Otimizada
      let badgeClass = "value-justo";
      if(data.value_status.includes("ALTO VALOR")) badgeClass = "value-gold";
      if(data.value_status.includes("EVITAR")) badgeClass = "value-purple";

      resultsArea.innerHTML = `
        <div class="result-box">
          <div class="result-header">
            <span>CONFRONTO & TENDÊNCIAS</span>
            <span class="value-badge ${badgeClass}">${data.value_status}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">// ${data.contexto}</div>
          
          <label class="form-label">Estatísticas Mandante</label>
          <ul class="bullet-list">${data.casa_dados.map(i=>`<li>${i}</li>`).join('')}</ul>
          
          <label class="form-label" style="margin-top:10px">Estatísticas Visitante</label>
          <ul class="bullet-list">${data.fora_dados.map(i=>`<li>${i}</li>`).join('')}</ul>

          <label class="form-label" style="margin-top:10px">Histórico Direto (H2H)</label>
          <ul class="bullet-list">${data.h2h_dados.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>

        <div class="result-box">
          <div class="result-header">PROBABILIDADES 1X2</div>
          <div class="prob-container">
            <div class="prob-bar-wrapper">
              <div class="prob-seg" style="width:${data.home_prob}%;background:var(--green)">1 (${data.home_prob}%)</div>
              <div class="prob-seg" style="width:${data.draw_prob}%;background:var(--yellow)">X (${data.draw_prob}%)</div>
              <div class="prob-seg" style="width:${data.away_prob}%;background:var(--red)">2 (${data.away_prob}%)</div>
            </div>
          </div>
          <div class="row-grid" style="margin-top:14px">
            <div>
              <label class="form-label">AMBAS MARCAM (BTTS)</label>
              <div style="font-family:'JetBrains Mono';font-weight:bold;color:var(--green)">${data.btts_prob}%</div>
            </div>
            <div>
              <label class="form-label">OVER 2.5 GOLS</label>
              <div style="font-family:'JetBrains Mono';font-weight:bold;color:var(--green)">${data.over25_prob}%</div>
            </div>
          </div>
        </div>

        <div class="scout-tip-card">
          <div class="scout-tip-title">🎯 PALPITE SCOUT</div>
          <div class="scout-tip-body">
            <span style="color:var(--green);font-weight:bold">${data.palpite_principal}</span><br>
            <span style="font-size:12px;color:var(--muted)">${data.raciocinio_final}</span>
          </div>
        </div>
      `;

      loadingArea.style.display = "none";
      resultsArea.style.display = "block";

    } catch(err) {
      alert("Erro no Processamento: " + err.message + "\n\nVerifique sua conexão e saldo de créditos na Anthropic.");
      loadingArea.style.display = "none";
    } finally {
      btnAnalyze.disabled = false;
    }
  });
});
</script>
</body>
</html>
